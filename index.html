<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HIMS — Patient Intake</title>
    <meta name="description" content="Hospital Information Management System — Patient Registration" />
    <link rel="icon" type="image/svg+xml" href="/hims-icon.svg" />
    <!--
      ╔══════════════════════════════════════════════════════════════╗
      ║  SECURITY HEADERS NOTE                                       ║
      ║  X-Frame-Options, X-Content-Type-Options, HSTS, and the     ║
      ║  Content-Security-Policy frame-ancestors directive CANNOT    ║
      ║  be enforced via <meta> tags. They MUST be set by the        ║
      ║  server (nginx.conf). See /nginx.conf in this package.       ║
      ║  The CSP below only covers resource-loading policy for       ║
      ║  browsers that support meta CSP (partial support).           ║
      ╚══════════════════════════════════════════════════════════════╝
    -->
    <!--
      Fonts are self-hosted in /public/fonts/ — NO Google Fonts CDN calls.
      This prevents third-party IP tracking of patient browsing sessions.
    -->
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f5f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    background:#fff;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.login-container h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#007BFF;
    text-decoration:none;
}
      
      /* Self-hosted Inter font — no external CDN calls */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/inter-400.woff2') format('woff2'),
             url('/fonts/inter-400.woff')  format('woff');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('/fonts/inter-500.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('/fonts/inter-600.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('/fonts/inter-700.woff2') format('woff2'),
             url('/fonts/inter-700.woff')  format('woff');
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
      <div class="login-container">
        <h2>Login</h2>

        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="#">Sign Up</a></p>
    </div>
  </body>
</html>
